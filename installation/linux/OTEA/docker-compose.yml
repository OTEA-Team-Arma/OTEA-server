version: '3.8'
services:
  otea-server:
    build: .
    container_name: otea-server
    ports:
      - "3000:3000"
    volumes:
      - ./users.json:/app/users.json
      - ./presets:/app/presets
      - ./config.json:/app/config.json
      - ./img:/app/img
      - ./css:/app/css
      - ./js:/app/js
      - ./index.html:/app/index.html
      - ./package.json:/app/package.json
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    working_dir: /app
    command: node js/server.js

  nginx:
    image: nginx:alpine
    container_name: otea-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./img:/usr/share/nginx/html/img:ro
      - ./css:/usr/share/nginx/html/css:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - otea-server
    restart: unless-stopped
