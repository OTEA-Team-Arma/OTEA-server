version: '3.8'

services:
  # Nginx Reverse Proxy (HTTPS frontend)
  nginx:
    image: nginx:latest
    container_name: otea-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl/:/etc/letsencrypt/:ro
      - ./logs/nginx/:/var/log/nginx/
    depends_on:
      - backend
    networks:
      - otea-net
    environment:
      - NGINX_HOST=example.com
      - NGINX_PORT=443

  # Node.js Backend (Isolated dans le réseau interne)
  backend:
    build:
      context: ../
      dockerfile: deployment/Dockerfile
    container_name: otea-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LOG_LEVEL=info
      # Charger depuis .env.prod (voir .env.example)
      - ARMA_SERVER_PATH=/opt/arma/server
      - STEAMCMD_PATH=/opt/steamcmd/steamcmd
    volumes:
      - /home/arma/server:/opt/arma/server:rw
      - /home/steamcmd:/opt/steamcmd:rw
      - ../data:/app/data:rw
      - ../presets:/app/presets:rw
      - ./logs/app/:/app/logs:rw
    expose:
      - "3000"
    networks:
      - otea-net
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Base de données optionnelle (pour futur)
  db:
    image: postgres:15-alpine
    container_name: otea-db
    restart: always
    environment:
      - POSTGRES_DB=otea
      - POSTGRES_USER=otea
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - ./data/db/:/var/lib/postgresql/data/
    networks:
      - otea-net
    expose:
      - "5432"

  # Monitoring (Prometheus - optionnel)
  prometheus:
    image: prom/prometheus:latest
    container_name: otea-prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus/:/prometheus/
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - otea-net
    expose:
      - "9090"

networks:
  otea-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  arma_data:
    driver: local
  db_data:
    driver: local
